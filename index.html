<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECMI 2026 Programme</title>
  <style>
    :root {
      --page: #f5f6f2;
      --surface: #fff;
      --ink: #17212b;
      --muted: #667085;
      --line: #d8ddd7;
      --green: #176b52;
      --green-soft: #e7f1ec;
      --blue: #245d88;
      --blue-soft: #e8f0f7;
      --gold: #9b6514;
      --gold-soft: #f6edda;
      --red: #923f3a;
      --red-soft: #f7e9e7;
      --violet: #68518b;
      --violet-soft: #eee9f5;
      --shadow: 0 8px 24px rgba(23,33,43,.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }
    .wrap { width: min(1240px, calc(100% - 32px)); margin-inline: auto; }
    .page-head { padding: 28px 0 18px; }
    h1 { margin: 0; font-size: 36px; letter-spacing: 0; }
    .subtitle { margin: 5px 0 0; color: var(--muted); }
    .filters-band {
      background: var(--surface);
      border-block: 1px solid var(--line);
      padding: 13px 0;
    }
    .filters {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 10px;
      align-items: end;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    select, input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      font-size: 15px;
    }
    select:focus, input:focus { outline: 3px solid rgba(36,93,136,.13); border-color: var(--blue); }
    .check-control {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 4px;
      color: var(--ink);
      text-transform: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .check-control input { width: 18px; min-height: 18px; height: 18px; margin: 0; accent-color: var(--green); }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .summary { display: flex; gap: 8px; align-items: baseline; padding: 18px 0 4px; color: var(--muted); }
    .summary strong { color: var(--ink); font-size: 20px; }
    .programme { padding-bottom: 42px; }
    .day-accordion { margin-top: 14px; border: 1px solid var(--line); border-radius: 7px; background: var(--surface); overflow: hidden; }
    .day-summary, .time-summary { list-style: none; cursor: pointer; }
    .day-summary::-webkit-details-marker, .time-summary::-webkit-details-marker { display: none; }
    .day-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 62px;
      padding: 14px 18px;
      background: var(--ink);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
    }
    .day-summary::after, .time-accordion > .time-summary::after { content: '+'; flex: 0 0 auto; font-size: 24px; line-height: 1; }
    .day-accordion[open] > .day-summary::after, .time-accordion[open] > .time-summary::after { content: '\2212'; }
    .summary-count { color: inherit; font-size: 13px; font-weight: 700; opacity: .75; }
    .day-content { padding: 10px; background: #eef1ed; }
    .time-accordion { background: var(--surface); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
    .time-accordion + .time-accordion, .time-accordion + .time-standalone, .time-standalone + .time-accordion, .time-standalone + .time-standalone { margin-top: 8px; }
    .time-standalone { background: var(--surface); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
    .standalone-row {
      display: grid;
      grid-template-columns: 82px 150px minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 56px;
      padding: 10px 14px;
    }
    .standalone-row.no-type { grid-template-columns: 82px minmax(0,1fr) auto; }
    .standalone-row time { color: var(--blue); font-size: 20px; font-weight: 800; }
    .standalone-type { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .standalone-main { min-width: 0; overflow-wrap: anywhere; }
    .standalone-main strong { margin-right: 8px; }
    .standalone-title { color: #344054; }
    .standalone-room { white-space: nowrap; color: var(--muted); font-size: 13px; }
    .standalone-main .inline-map { color: var(--blue); font-weight: 800; text-decoration: underline; }
    .plenary-row { background: var(--surface); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
    .plenary-summary {
      display: grid;
      grid-template-columns: 82px 110px minmax(0,1fr) auto auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      padding: 10px 14px;
      cursor: pointer;
      list-style: none;
    }
    .plenary-summary::-webkit-details-marker { display: none; }
    .plenary-summary::after { content: '+'; color: var(--gold); font-size: 24px; line-height: 1; }
    .plenary-row[open] > .plenary-summary::after { content: '\2212'; }
    .plenary-summary time { color: var(--blue); font-size: 20px; font-weight: 800; }
    .plenary-label { color: var(--gold); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .plenary-main { min-width: 0; overflow-wrap: anywhere; }
    .plenary-main strong { margin-right: 8px; }
    .plenary-details {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      padding: 12px 14px 13px 216px;
      border-top: 1px solid var(--line);
      background: var(--gold-soft);
      color: #4f4025;
      font-size: 14px;
    }
    .plenary-details p { margin: 0; }
    .plenary-details a { color: var(--blue); font-weight: 700; }
    .plenary-actions { flex: 0 0 100%; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 8px 20px; }
    .abstract-details { flex: 1 1 560px; }
    .abstract-details summary { width: fit-content; color: var(--blue); font-weight: 700; cursor: pointer; }
    .abstract-details p { margin-top: 10px; color: var(--ink); line-height: 1.58; }
    .time-summary {
      display: grid;
      grid-template-columns: 90px minmax(0,1fr) auto auto;
      gap: 12px;
      align-items: center;
      min-height: 52px;
      padding: 10px 14px;
      background: #fff;
    }
    .time-summary:hover { background: #f8faf7; }
    .time-summary time { color: var(--blue); font-size: 20px; font-weight: 800; }
    .time-summary strong { font-size: 16px; }
    .block-rooms { color: var(--muted); font-size: 13px; font-weight: 700; text-align: right; white-space: nowrap; }
    .time-group { border-top: 1px solid var(--line); padding: 12px; background: #f8faf7; }
    .session-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .session-card {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 5px solid var(--green);
      border-radius: 7px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .session-card.plenary { border-left-color: var(--gold); }
    .session-card.break { border-left-color: var(--blue); }
    .session-card.meal { border-left-color: var(--red); }
    .session-card.social { border-left-color: var(--violet); }
    .session-card.programme-item { border-left-color: #4d5965; }
    .session-head { padding: 12px 14px; border-bottom: 1px solid var(--line); background: #fbfcfa; }
    details.session-card > .session-head {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      align-items: center;
      gap: 10px;
      border-bottom: 0;
      cursor: pointer;
      list-style: none;
    }
    details.session-card > .session-head::-webkit-details-marker { display: none; }
    details.session-card > .session-head::after { content: '+'; font-size: 23px; line-height: 1; color: var(--green); }
    details.session-card[open] > .session-head { border-bottom: 1px solid var(--line); }
    details.session-card[open] > .session-head::after { content: '\2212'; }
    details.session-card > .session-head > div { min-width: 0; }
    .session-type { margin: 0 0 3px; color: var(--green); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .plenary .session-type { color: var(--gold); }
    .break .session-type { color: var(--blue); }
    .meal .session-type { color: var(--red); }
    .social .session-type { color: var(--violet); }
    .programme-item .session-type { color: #4d5965; }
    .session-head h4 { margin: 0; font-size: 16px; overflow-wrap: anywhere; }
    .session-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 7px; color: var(--muted); font-size: 13px; }
    .talk-list { margin: 0; padding: 0; list-style: none; }
    .talk { display: grid; grid-template-columns: 58px minmax(0,1fr); gap: 10px; padding: 12px 14px; }
    .talk + .talk { border-top: 1px solid var(--line); }
    .talk-time { color: var(--blue); font-weight: 800; }
    .speaker { margin: 0; font-weight: 800; }
    .speaker-institution { color: var(--muted); font-weight: 400; }
    .institution { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .talk-title { margin: 5px 0 0; overflow-wrap: anywhere; }
    .single-item { padding: 14px; }
    .single-name { margin: 0; font-size: 18px; font-weight: 800; }
    .single-title { margin: 5px 0 0; }
    .empty { display: none; padding: 32px; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: 7px; color: var(--muted); }
    mark { background: #ffe192; border-radius: 2px; padding: 0 2px; }
    @media (max-width: 920px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .session-grid { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
    @media (max-width: 560px) {
      .wrap { width: min(100% - 20px, 1240px); }
      .page-head { padding-top: 20px; }
      h1 { font-size: 29px; }
      .filters { grid-template-columns: 1fr; }
      .time-summary { grid-template-columns: 58px minmax(0,1fr) auto auto; gap: 8px; }
      .time-summary .summary-count { display: none; }
      .time-summary time { font-size: 17px; }
      .block-rooms { max-width: 115px; white-space: normal; font-size: 11px; }
      .standalone-row { grid-template-columns: 58px minmax(0,1fr); gap: 4px 10px; }
      .standalone-row.no-type { grid-template-columns: 58px minmax(0,1fr); }
      .standalone-type { grid-column: 2; }
      .standalone-main { grid-column: 2; }
      .standalone-room { grid-column: 2; }
      .plenary-summary { grid-template-columns: 58px minmax(0,1fr) auto; gap: 4px 10px; }
      .plenary-label, .plenary-main { grid-column: 2; }
      .plenary-summary .standalone-room { grid-column: 2; }
      .plenary-details { padding: 12px 14px 13px 82px; }
      .talk { grid-template-columns: 48px minmax(0,1fr); padding-inline: 11px; }
    }
  </style>
</head>

    const plenaryAbstracts = {"Marta Fiocco":"Time-varying confounders pose a major challenge in causal inference because they both both influence and are influenced by prior treatments and outcomes. When longitudinal covariates contain multiple categorical levels, the number of possible covariate combinations can rapidly increase, leading to sparse or empty data cells that violate the positivity assumption and complicate causal estimation. These challenges become even greater when confounders are latent, since the underlying disease state must be inferred from noisy observations, potentially introducing misclassification bias. Rather than assuming exact identification of latent states from observed data, it is more realistic to estimate state membership probabilities or relative risks of experiencing one latent condition versus another over time. We propose a two-step causal inference approach to estimate the effect of a time-varying exposure on a survival outcome when the causal relationship is confounded by visit-specific relative risks of latent disease states. In the first step, a latent Markov model is used to reduce the high-dimensional space of observed longitudinal covariates into time-varying relative risks associated with latent states. In the second step, marginal structural models (MSMs) are applied to estimate treatment effects under different exposure histories using inverse probability weighting to account for both treatment assignment and censoring due to dropout. Average treatment effects (ATEs) are quantified as differences in restricted mean survival time under alternative exposure strategies. We illustrate the proposed approach using data from the Euro Ewing 2012 trial, which evaluated chemotherapy adjustment strategies in patients with Ewing sarcoma, a particularly challenging setting because of chemotherapy-induced toxicities. Latent disease states represent overall toxicity conditions during therapy, inferred from the observed severity of multiple adverse events. Cycle-specific relative risks of latent overall toxicity were incorporated as confounders when estimating the effect of a bivariate time-varying exposure (dose reductions and cycle delays) on event-free survival (EFS). To evaluate the EFS benefits of different treatment-adjustment strategies, the estimated ATEs were compared with those from the per-protocol strategy (never reduced, never delayed) across multiple MSM specifications.","Paola F. Antonietti":"Neurodegenerative diseases (NDs) are disorders characterized by progressive structural and functional damage to the brain. A common hallmark of many NDs is the accumulation of disease-specific misfolded and aggregated proteins; examples include amyloid-beta and tau in Alzheimer s disease, or alpha-synuclein in Parkinson\u2019s disease. In this talk, we present a novel framework that integrates multiphysics mathematical modeling, advanced discretization methods, and computational learning algorithms to understand the mechanisms of neurodegeneration. First, we discuss the spatiotemporal dynamics of misfolded proteins through advanced conformational conversion models discretized by high-order discontinuous Galerkin methods on polytopal grids [1,2]. Then, we present multiphysics mathematical models of cerebral waste-clearance dynamics [3] a critical factor influencing the onset and progression of NDs and tissue atrophy [4], and discuss how neurodegeneration-associated pathological processes may increase the likelihood of epileptiform activity [5]. We present extensive numerical simulations of patient-specific brain geometries reconstructed from clinical imaging to validate the proposed approaches. If time permits, we introduce an integrated computational learning framework for predicting personalized trajectories of ND progression from sparse, irregularly sampled, and multimodal clinical data. This approach exploits Neural ODEs to infer latent disease states and predict biomarker evolution, offering a promising pathway toward personalized modeling of NDs.","Pawe\u0142 D\u0142otko":"While the data revolution has brought unprecedented quantities of information, many challenges in science and industry still arise from complex, heterogeneous, or limited datasets. Across all these settings, the shape of data, its intrinsic organization and geometry, often encodes essential information that standard statistical or machine learning tools overlook. Topological Data Analysis (TDA) provides a rigorous mathematical framework to extract, visualize, and quantify this shape, offering insights that remain robust even when data are sparse or noisy. In this talk, I will demonstrate how TDA enables explainable exploration of complex datasets across domains such as materials science, manufacturing, and biomedical research. By capturing structural and dynamical features in a compact geometric form, TDA not only supports industrial decision-making and data-driven modeling but also offers a transparent and interpretable representation of the underlying processes. This topological explainability allows one to link observed data structures to physical mechanisms, biological organization, or functional behavior, bridging the gap between data and theory. Beyond static analysis, I will show how topological summaries can be used to study dynamics: reconstructing system trajectories, identifying transitions, and revealing how the geometry of data evolves over time. Through this perspective, TDA emerges as a tool that connects physics, data science, and interpretability, reminding us that in understanding complex systems, shape truly matters.","Lorenzo Pareschi":"Fusion energy promises a virtually inexhaustible, carbon-free power source by reproducing on Earth the same processes that fuel the Sun. The quest for controlled nuclear fusion brings together some of the most fascinating and challenging problems in applied mathematics. Plasmas, ionised gases governed by kinetic and electromagnetic interactions, exhibit extreme multiscale behaviour, from nonlocal transport to macroscopic confinement and turbulence. Developing models and algorithms capable of capturing this complexity, while remaining computationally tractable, lies at the core of mathematical plasma science. This lecture will outline recent progress in structure-preserving and asymptotic-preserving numerical methods that bridge kinetic and fluid descriptions, and in hybrid deterministic particle approaches that enable realistic simulations of collisional, magnetised plasmas. I will also discuss model predictive control strategies and emerging operator-learning techniques, including tensor neural networks and physics-informed architectures, that allow data-driven model reduction and real-time control while maintaining physical consistency.","Stefano Maria Iacus":"Digital platforms have become critical environments where information spreads, collective behaviours form, and societal risks can escalate rapidly and endogenously. This talk examines how data science can contribute to a safer, more predictable, and more trusted online world. Several risks that arise naturally from technological features of today\u2019s digital ecosystems, such as end-to-end AI recommender systems, AI companions, age-verification challenges, online fraud, and other emerging harms, can be better understood and mitigated through robust data-science pipelines. Europe\u2019s Digital Services Act, particularly Article 40(12), now guarantees controlled data access for vetted researchers. This provision represents a major opportunity for the data-science community: for the first time, independent scholars can systematically study platform dynamics, audit algorithmic systems, and generate evidence that contributes directly to safer, more transparent, and accountable digital environments. Therefore, this talk will also discuss how this new opportunity enables data scientists to play a more active and impactful role in improving online safety. Overall, the talk presents a unified vision: data science, supported by responsible governance and meaningful data access, provides essential capabilities for building digital ecosystems that are safer, more predictable, and worthy of public trust.","Sigrid Leyendecker":"Virtual prototyping has become a vital component in modern industrial product development, significantly enhancing the design process while minimizing costs and improving product performance. This talk will delve into the ongoing research focused on developing accurate mathematical models that capture the nonlinear behavior of dynamical systems, along with efficient numerical methods for simulation. Adopting a geometric perspective when studying nonlinear mechanical systems reveals that symmetries and invariants provide critical insights into their behaviour. Leveraging these structural properties, we can create numerical methods that preserve the geometric essence of the systems, such as variational integrators that maintain symplectic-momentum conservation. These structure-preserving simulation tools enhance the fidelity of the numerical solutions by accurately reflecting symmetries and invariants, while also stabilising the integration process. This stability is crucial for optimising computational efficiency, particularly regarding grid resolution and long-term simulations. The importance of reliable and efficient simulations is further amplified within the realm of optimisation and control of dynamical systems, as for example with regard to soft robotic systems. These systems utilise smart and compliant actuators, showcase energy efficiency and safe interaction capabilities, making them increasingly relevant in industrial production, medical applications, and everyday life. This talk will highlight the advantages of employing a geometric framework for the modeling, simulation, and optimal control of nonlinear dynamical systems, demonstrating its potential in various application fields.","Mayur Pal":"The global energy transition requires innovative solutions to achieve large-scale decarbonization, integrate renewable energy, and enhance energy security. This plenary talk explores how mathematics and artificial intelligence (AI) are transforming subsurface energy technologies, with a focus on carbon capture, utilization, and storage (CCUS), geothermal energy systems, and underground hydrogen storage. By integrating advanced mathematical modeling, high-performance computational simulations, and machine learning techniques, we demonstrate how geological uncertainties in subsurface systems can be addressed more efficiently and reliably. Case studies will present both experimental and simulation-based results, ranging from microfluidic investigations to reservoir-scale models, highlighting the critical role of data-driven approaches in accelerating system design, monitoring, and optimization. The talk will further examine AI-enabled methods for predictive modeling, uncertainty quantification, and decision support in subsurface energy storage and CO2 sequestration. Particular emphasis will be placed on emerging techniques such as surrogate modeling and physics-informed neural networks, which significantly improve computational efficiency, scalability, and predictive reliability. By bridging theory, computation, and practical application, this presentation provides a forward-looking perspective on how mathematical sciences and AI-driven technologies can foster innovation and support the development of safe, efficient, and sustainable energy systems for the future.","Rita Laura D'Ecclesia":"The progressive convergence of insurance and banking is reshaping the architecture of modern financial systems, driven by increasing interdependencies in risk management, capital allocation, and regulatory requirements. In the aftermath of the global financial crisis, the introduction of Solvency II and Basel III has established risk-sensitive supervisory regimes that, while sector-specific, exhibit growing conceptual and quantitative overlap in their treatment of market and credit risks. This paper investigates the quantitative linkages between these frameworks, with particular emphasis on the interaction between internal models for credit spread risk under Solvency II and market risk models under Basel III. We examine how these models behave under stressed market conditions, highlighting differences in calibration, capital sensitivity, and the treatment of tail risk. Existing literature points to significant discrepancies in capital requirements across the two regimes, which may create inconsistencies and potential regulatory arbitrage opportunities. Using empirical evidence from backtesting exercises, we analyze breach patterns across rating classes and maturities, with a focus on the stability of model performance across changing volatility regimes. The findings reveal that regime shifts and market turbulence pose substantial challenges to calibration, particularly in the presence of procyclical mechanisms embedded in risk-sensitive capital frameworks. In this context, the role of volatility adjustments and spread dynamics within Solvency II is examined, as these mechanisms aim to mitigate excessive sensitivity to short-term market dislocations. Building on these insights, we explore integrated stress-testing approaches that combine solvency and liquidity perspectives across banking and insurance balance sheets. Stress testing, a cornerstone of Basel III risk management, provides a natural bridge between the two sectors by enabling forward-looking assessments of systemic vulnerabilities. We propose joint liquidity\u2013solvency metrics designed to enhance resilience, improve capital efficiency, and reduce procyclicality in interconnected financial systems. Overall, the paper contributes to the literature on integrated risk management by offering a cross-sectoral perspective on model design, calibration, and regulatory alignment. It provides actionable insights for financial institutions seeking to optimize risk-adjusted returns while maintaining robustness in an increasingly integrated and volatile financial environment."};
    const $ = id => document.getElementById(id);

    function minutes(value) {
      const parts = String(value).split(':').map(Number);
      return parts[0] * 60 + parts[1];
    }

    function activityDateTime(row) {
      return new Date(`${conferenceDates[row.day]}T${row.time}:00+03:00`);
    }

    function activityType(row) {
      const name = row.name.toLowerCase();
      if (row.track.toLowerCase().startsWith('plenary')) return 'plenary';
      if (name.includes('coffee break')) return 'break';
      if (name === 'lunch') return 'meal';
      if (/(reception|excursion|social dinner)/.test(name)) return 'social';
      if (/(opening ceremony|industry speakers|lanczos prize|anile-ecmi prize winner|wacker memorial prize winner|panel discusion|closing)/.test(name)) return 'programme';
      return 'parallel';
    }

    function isEcmiPrizeTalk(row) {
      return /anile-ecmi prize winner|wacker memorial prize winner/i.test(row.name);
    }

    function approximatePeriod(row) {
      const time = minutes(row.time);
      if (time < 13 * 60) return 'morning';
      if (time <= 17 * 60) return 'afternoon';
      return 'evening';
    }

    function blockKey(row) {
      const type = activityType(row);
      const time = minutes(row.time);
      if (isEcmiPrizeTalk(row)) return '17:15';
      if (type === 'parallel' && time >= 10 * 60 + 30 && time < 12 * 60) return '10:30';
      if (type === 'parallel' && time >= 15 * 60 + 30 && time <= 17 * 60) return '15:30';
      if (type === 'parallel' && time >= 17 * 60 + 15 && time < 19 * 60) return '17:15';
      return row.time;
    }

    function blockLabel(rows, key) {
      const types = new Set(rows.map(activityType));
      if (rows.some(isEcmiPrizeTalk)) return 'ECMI prize winners';
      if (types.has('parallel')) {
        if (key === '10:30') return 'Morning parallel sessions';
        if (key === '15:30') return 'Afternoon parallel sessions';
        if (key === '17:15') return 'Late parallel sessions';
      }
      if (types.has('plenary')) return 'Plenary talk';
      if (types.has('break')) return 'Coffee break';
      if (types.has('meal')) return 'Lunch';
      if (types.has('social')) return 'Social programme';
      return 'Special activities';
    }

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }

    function highlighted(value, query) {
      const safe = esc(value);
      if (!query) return safe;
      const pattern = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(pattern, 'ig'), match => `<mark>${match}</mark>`);
    }

    function linkedMapText(value, query) {
      const match = String(value).match(/map/i);
      if (!match) return highlighted(value,query);
      const start = match.index;
      return `${highlighted(value.slice(0,start),query)}<a class="inline-map" href="https://maps.app.goo.gl/GSkttjqaCK51Hdky7" target="_blank" rel="noopener">${highlighted(match[0],query)}</a>${highlighted(value.slice(start + match[0].length),query)}`;
    }

    function groupBy(items, keyFn) {
      return items.reduce((map, item) => {
        const key = keyFn(item);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
        return map;
      }, new Map());
    }

    function renderParallel(rows, query) {
      const sessions = groupBy(rows, row => `${row.room}|||${row.track}`);
      return [...sessions.entries()].map(([key, talks]) => {
        const [room, track] = key.split('|||');
        const chair = talks.find(talk => talk.chair)?.chair || '';
        const sessionType = track.includes('(') && track.includes(')') ? 'Mini-symposium' : 'Field session';
        talks.sort((a,b) => minutes(a.time)-minutes(b.time) || a.name.localeCompare(b.name));
        return `<details class="session-card" ${query ? 'open' : ''}>
          <summary class="session-head">
            <div>
              <p class="session-type">${sessionType}</p>
              <h4>${highlighted(track || 'General session', query)}</h4>
            <div class="session-meta"><span><strong>Room:</strong> ${highlighted(room || 'TBA',query)}</span>${chair ? `<span><strong>Chair:</strong> ${highlighted(chair,query)}</span>` : ''}</div>
            </div>
          </summary>
          <ol class="talk-list">${talks.map(talk => `<li class="talk">
            <time class="talk-time">${esc(talk.time)}</time>
            <div>
              <p class="speaker">${highlighted(talk.name,query)}${talk.institution ? `<span class="speaker-institution"> (${highlighted(talk.institution,query)})</span>` : ''}</p>
              <p class="talk-title">${highlighted(talk.title,query)}</p>
            </div>
          </li>`).join('')}</ol>
        </details>`;
      }).join('');
    }

    function renderSingle(row, query) {
      const type = activityType(row);
      const labels = {
        plenary:'Plenary talk', break:'Coffee break', meal:'Lunch', social:'Social activity', programme:'Special activity'
      };
      return `<article class="session-card ${type === 'programme' ? 'programme-item' : type}">
        <header class="session-head">
          <p class="session-type">${labels[type]}</p>
          <div class="session-meta">${row.room ? `<span><strong>Room:</strong> ${esc(row.room)}</span>` : ''}</div>
        </header>
        <div class="single-item">
          <p class="single-name">${highlighted(row.name,query)}${row.institution ? `<span class="speaker-institution"> (${highlighted(row.institution,query)})</span>` : ''}</p>
          ${row.title ? `<p class="single-title">${highlighted(row.title,query)}</p>` : ''}
        </div>
      </article>`;
    }

    function renderPrizeSession(rows, query) {
      const talks = [...rows].sort((a,b) => minutes(a.time)-minutes(b.time));
      const chair = talks.find(row => row.chair)?.chair || '';
      return `<article class="session-card programme-item">
        <header class="session-head">
          <h4>ECMI prize winners</h4>
          <div class="session-meta">${chair ? `<span><strong>Session chair:</strong> ${highlighted(chair,query)}</span>` : ''}</div>
        </header>
        <ol class="talk-list">${talks.map(talk => `<li class="talk">
          <time class="talk-time">${esc(talk.time)}</time>
          <div><p class="speaker">${highlighted(talk.name,query)}</p></div>
        </li>`).join('')}</ol>
      </article>`;
    }

    const days = [...new Set(source.map(row => row.day))].sort((a,b) => dayOrder.indexOf(a)-dayOrder.indexOf(b));

    function render() {
      const query = $('searchFilter').value.trim().toLowerCase();
      const includePast = $('fullProgramme').checked;
      const now = new Date();
      const rows = source.filter(row => {
        const plenary = plenarySpeakers[row.name] || {};
        const haystack = [row.name,row.title,row.track,row.room,row.institution,row.chair,plenary.displayName,plenary.institution,plenary.chair,plenaryAbstracts[row.name]].join(' ').toLowerCase();
        return (includePast || activityDateTime(row) >= now) && (!query || haystack.includes(query));
      });

      $('emptyState').style.display = rows.length ? 'none' : 'block';
      const html = days.map((day, dayIndex) => {
        const dayRows = rows.filter(row => row.day === day);
        if (!dayRows.length) return '';
        const blocks = groupBy(dayRows, blockKey);
        const times = [...blocks.entries()].sort((a,b) => minutes(a[0])-minutes(b[0])).map(([key, blockRows]) => {
          const parallel = blockRows.filter(row => activityType(row) === 'parallel');
          const prizeTalks = blockRows.filter(isEcmiPrizeTalk);
          const singles = blockRows.filter(row => activityType(row) !== 'parallel' && !isEcmiPrizeTalk(row));
          const rooms = [...new Set([...parallel,...prizeTalks].map(row => row.room).filter(Boolean))].sort((a,b) => a.localeCompare(b,undefined,{numeric:true}));
          const cards = [renderParallel(parallel,query), prizeTalks.length ? renderPrizeSession(prizeTalks,query) : '', ...singles.map(row => renderSingle(row,query))].filter(Boolean).join('');
          if (blockRows.length === 1) {
            const row = blockRows[0];
            const mainText = row.name || row.title || blockLabel(blockRows,key);
            if (activityType(row) === 'plenary') {
              const speaker = plenarySpeakers[row.name] || { institution: row.institution, field: '', profile: '' };
              const abstractMatches = query && plenaryAbstracts[row.name]?.toLowerCase().includes(query);
              return `<details class="plenary-row" ${query ? 'open' : ''}>
                <summary class="plenary-summary">
                  <time>${esc(key)}</time>
                  <span class="plenary-label">Plenary talk</span>
                  <span class="plenary-main"><strong>${highlighted(speaker.displayName || row.name,query)}</strong><span class="standalone-title">${highlighted(row.title,query)}</span></span>
                  ${row.room ? `<span class="standalone-room">Room ${highlighted(row.room,query)}</span>` : ''}
                </summary>
                <div class="plenary-details">
                  ${speaker.institution ? `<p><strong>Institution:</strong> ${highlighted(speaker.institution,query)}</p>` : ''}
                  ${speaker.chair ? `<p><strong>Session chair:</strong> ${highlighted(speaker.chair,query)}</p>` : ''}
                  <div class="plenary-actions">
                    ${speaker.profile ? `<a href="${esc(speaker.profile)}" target="_blank" rel="noopener">Speaker profile</a>` : ''}
                    ${plenaryAbstracts[row.name] ? `<details class="abstract-details" ${abstractMatches ? 'open' : ''}><summary>Abstract</summary><p>${highlighted(plenaryAbstracts[row.name],query)}</p></details>` : ''}
                  </div>
                </div>
              </details>`;
            }
            const isSocialDinner = row.day === 'Thursday' && row.time === '18:00' && row.name.toLowerCase().includes('social dinner');
            return `<section class="time-standalone"><div class="standalone-row no-type">
              <time>${esc(key)}</time>
              <span class="standalone-main"><strong>${isSocialDinner ? linkedMapText(mainText,query) : highlighted(mainText,query)}${row.institution ? `<span class="speaker-institution"> (${highlighted(row.institution,query)})</span>` : ''}</strong>${row.title && row.title !== mainText ? `<span class="standalone-title">${highlighted(row.title,query)}</span>` : ''}</span>
              ${row.room || row.chair ? `<span class="standalone-room">${row.room ? `Room ${highlighted(row.room,query)}` : ''}${row.room && row.chair ? ' · ' : ''}${row.chair ? `Session chair: ${highlighted(row.chair,query)}` : ''}</span>` : ''}
            </div></section>`;
          }
          return `<details class="time-accordion" ${query ? 'open' : ''}>
            <summary class="time-summary">
              <time>${esc(key)}</time>
              <strong>${blockLabel(blockRows,key)}</strong>
              ${rooms.length ? `<span class="block-rooms">${rooms.length === 1 ? 'Room' : 'Rooms'} ${rooms.map(esc).join(', ')}</span>` : ''}
            </summary>
            <div class="time-group"><div class="session-grid">${cards}</div></div>
          </details>`;
        }).join('');
        return `<details class="day-accordion" ${query || dayIndex === 0 ? 'open' : ''}>
          <summary class="day-summary"><span>${esc(day)}</span></summary>
          <div class="day-content">${times}</div>
        </details>`;
      }).join('');
      $('schedule').innerHTML = html;
      if (query.length >= 2) {
        requestAnimationFrame(() => {
          const firstMatch = $('schedule').querySelector('mark');
          if (firstMatch) firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }
    }

    $('searchFilter').addEventListener('input',render);
    $('fullProgramme').addEventListener('change',render);
    $('clearBtn').addEventListener('click',() => {
      $('searchFilter').value = '';
      $('fullProgramme').checked = false;
      render();
    });
    render();
  </script>
</body>
</html>
